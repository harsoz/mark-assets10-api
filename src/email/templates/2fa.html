<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Código de verificación</title>
    <!-- Incluye el mismo bloque <style> estándar utilizado en los demás correos -->
</head>
<body>
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" class="body">
      <tr>
        <td>&nbsp;</td>
        <td class="container">
          <div class="content">
            <span class="preheader">Tu código de verificación</span>
            <table role="presentation" border="0" cellpadding="0" cellspacing="0" class="main">
              <tr>
                <td class="wrapper">
                  <p>Saludos!</p>
                  <p><b>{{CustomerEmail}}</b></p>
                  <p>Este es tu código de verificación:</p>
                  <br />
                  <p><b>C:</b> {{Code}}</p>
                </td>
              </tr>
            </table>
            <!-- Footer estándar con el enlace de WhatsApp -->
          </div>
        </td>
      </tr>
    </table>
</body>
</html>
